<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/css.css" >
    <title>Palitra</title>
    <link rel="icon" href="image/logo.svg">
</head>
<body class="forms">
    <fieldset>
        <legend class="h1">Регистрация</legend>
        <form action="profil.html">
            <label>Введите имя пользователя</label>
                <input type="text" name="name" placeholder="user123" required>
            <label>Введите электронную почту</label>
                <input type="email" name="email" placeholder="qwerty@gmail.com" required>
            <label>Введите пароль</label>
                <input type="password" name="password" placeholder="минимум 6 cимволов" minlength="6" required>
            <label>Введите дату рождения</label>
                <input type="date" name="data" placeholder="01.01.2002">
            <label>Введите страну проживания</label>
            <select name="country" required > 
                <option value="">выбрать</option>
                <option value="ru">Россия</option>
                <option value="kz">Казахстан</option>
                <option value="bl">Беларусь</option>
                <option value="br">Другая</option>
            </select>
            <label>Укажите пол</label>
            <div class="checkbox-row" style="margin-top: 5px;">
                <label><input class="radio-spacing" type="radio" name="gender" value="жен" required>жен</label>
                <label><input class="radio-spacing" type="radio" name="gender" value="муж" >муж</label>
                <label><input class="radio-spacing"type="radio" name="gender" value="нет" >не указывать</label>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" required>
                <label> Я согласен на обработку пероснальных данных</label>
            </div>
            <div class="btn-row">
                <button type="reset">Очистить</button>
                <button type="submit">Зарегистрироваться</button>
            </div>    
        </form>
    </fieldset>
</body>
