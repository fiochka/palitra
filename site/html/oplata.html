<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/css.css">
    <title>Palitra — Оплата</title>
    <link rel="icon" href="image/logo.svg">
</head>
<body class="forms">
    <fieldset class="checkout">
        <legend class="h1">Оплата Palitra+</legend>

        <div class="summary">
            <span>Подписка Palitra+</span>
            <span>199 ₽</span>
        </div>
        <div class="summary">
            <span>Период</span>
            <span>1 месяц</span>
        </div>
        <div class="summary total">
            <span>Итого</span>
            <span>199 ₽</span>
        </div>

        <form action="glavnaya.html">
            <label>Номер карты</label>
            <input type="text" name="card" placeholder="0000 0000 0000 0000" inputmode="numeric" required>

            <label>Имя владельца</label>
            <input type="text" name="holder" placeholder="IVAN IVANOV" required>

            <div class="field-row">
                <div>
                    <label>Срок действия</label>
                    <input type="text" name="expiry" placeholder="ММ/ГГ" required>
                </div>
                <div>
                    <label>CVC</label>
                    <input type="password" name="cvc" placeholder="•••" maxlength="3" required>
                </div>
            </div>

            <div class="btn-row">
                <a class="btn-cancel" href="podpiska.html">Отмена</a>
                <button type="submit">Оплатить 199 ₽</button>
            </div>
        </form>
    </fieldset>
</body>
</html>
